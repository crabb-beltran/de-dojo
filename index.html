<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DE Lab — Data Engineering training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.min.js"></script>
<style>
  :root{
    --ink:#0B192C;--surface:#1E3E62;--panel:#16314F;--border:#2C5480;
    --text:#F1F1F1;--muted:#9FB3C8;
    --coral:#00D2C4;--mint:#00D2C4;--ok:#00D2C4;--blue:#00D2C4;
    --gold:#FF9F29;--amber:#FF9F29;--bad:#FF5252;--violet:#C3A6FF;
    --onprimary:#04201E;--glow:#123157;--editorbg:#0B192C;
    --ui:'Manrope',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;--display:'Fraunces',Georgia,serif;
  }
  [data-theme="light"]{
    --ink:#FAFAFA;--surface:#ECEFF1;--panel:#FFFFFF;--border:#D4DCE2;
    --text:#1A237E;--muted:#5A6B8C;
    --coral:#1A237E;--mint:#00A99D;--ok:#00A99D;--blue:#1A237E;
    --gold:#FF9900;--amber:#FF9900;--bad:#FF5252;--violet:#5E35B1;
    --onprimary:#FFFFFF;--glow:#E8EEF5;
  }
  *{box-sizing:border-box}html,body{height:100%;margin:0}
  body{background:radial-gradient(1200px 600px at 80% -10%,var(--glow) 0%,var(--ink) 55%) fixed,var(--ink);color:var(--text);font-family:var(--ui);display:grid;grid-template-rows:auto 1fr;overflow:hidden}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  ::selection{background:var(--coral);color:var(--onprimary)}
  /* top */
  .top{display:flex;align-items:center;gap:14px;padding:10px 18px;border-bottom:1px solid var(--border);background:rgba(11,16,18,.7);backdrop-filter:blur(8px)}
  .brand{font-family:var(--display);font-weight:900;font-size:18px;letter-spacing:.3px;display:flex;align-items:center;gap:8px;cursor:pointer}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--coral);box-shadow:0 0 12px var(--coral)}
  .brand em{font-style:normal;color:var(--mint)}
  .nav{display:flex;gap:2px;flex-wrap:wrap}
  .navbtn{font-family:var(--mono);font-size:12px;padding:6px 11px;color:var(--muted);background:transparent;border:1px solid transparent;border-radius:8px;cursor:pointer}
  .navbtn:hover{color:var(--text)} .navbtn.on{color:var(--coral);border-color:var(--border);background:var(--panel)}
  .spacer{flex:1}
  .lang{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .lang button{font-family:var(--mono);font-size:11px;padding:5px 9px;background:transparent;color:var(--muted);border:0;cursor:pointer}
  .lang button.on{background:var(--coral);color:var(--onprimary);font-weight:600}
  .xpmini{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;gap:8px;align-items:center}
  .xpmini b{color:var(--gold)}
  .ghostbtn{font-family:var(--mono);font-size:11px;padding:5px 9px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--muted);cursor:pointer}
  .ghostbtn:hover{color:var(--text);border-color:var(--coral)}
  /* views */
  .view{display:none;min-height:0;overflow:auto}
  .view.show{display:block}
  .gridview{display:none;min-height:0;overflow:hidden}
  .gridview.show{display:grid}
  /* landing */
  .home{padding:46px 30px 60px;max-width:1180px;margin:0 auto}
  .kicker{font-family:var(--mono);font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--mint);margin-bottom:14px}
  .hero h1{font-family:var(--display);font-weight:900;font-size:clamp(34px,6vw,68px);line-height:1.02;margin:0 0 16px;letter-spacing:-.5px}
  .hero h1 em{font-style:italic;color:var(--coral)}
  .hero p{font-size:16px;line-height:1.6;color:#c4d2cf;max-width:620px;margin:0 0 10px}
  .stats{display:flex;gap:26px;flex-wrap:wrap;margin:26px 0 40px;font-family:var(--mono)}
  .stats .s b{font-family:var(--display);font-size:30px;font-weight:700;color:var(--gold);display:block;line-height:1}
  .stats .s span{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .mods{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
  .mod{position:relative;border:1px solid var(--border);border-radius:16px;padding:22px;background:linear-gradient(160deg,var(--panel),transparent);cursor:pointer;transition:.18s;overflow:hidden}
  .mod:hover{transform:translateY(-3px);border-color:var(--coral)}
  .mod .ic{font-size:22px;margin-bottom:12px}
  .mod h3{font-family:var(--display);font-weight:700;font-size:21px;margin:0 0 6px}
  .mod p{font-size:13.5px;line-height:1.5;color:#b6c5c2;margin:0}
  .mod .arr{position:absolute;top:20px;right:20px;color:var(--muted);transition:.18s}
  .mod:hover .arr{color:var(--coral);transform:translateX(3px)}
  .mod.guide{background:linear-gradient(160deg,#1a1420,transparent)} .mod.guide:hover{border-color:var(--violet)}
  /* guide view */
  .guideWrap{display:flex;flex-direction:column;height:100%}
  .gtop{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--border);background:var(--panel)}
  .gtop b{font-family:var(--display);font-size:16px}
  .guideWrap iframe{flex:1;border:0;width:100%;background:#fff}
  /* grid */
  .grid{grid-template-columns:288px 1fr 1fr}
  .rail{border-right:1px solid var(--border);background:var(--surface);overflow:auto;min-height:0}
  .cat{padding:13px 16px 6px;font-family:var(--mono);font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mint);position:sticky;top:0;background:var(--surface);z-index:1}
  .ex{padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;gap:10px;align-items:flex-start;transition:.12s}
  .ex:hover{background:var(--panel)} .ex.active{background:var(--panel);box-shadow:inset 3px 0 0 var(--coral)}
  .ex .ico{font-family:var(--mono);font-size:9.5px;font-weight:600;padding:2px 5px;border-radius:5px;border:1px solid var(--border);color:var(--muted);flex:none;margin-top:1px}
  .ex .ico.sql{color:var(--mint);border-color:#2a4642}.ex .ico.python{color:var(--gold);border-color:#4a4326}.ex .ico.quiz{color:var(--violet);border-color:#3f3556}
  .ex .tt{font-size:13px;font-weight:600;line-height:1.25}
  .ex .mt{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
  .ex .chk{margin-left:auto;color:var(--mint);flex:none}
  .diff{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--muted);margin-right:3px}
  .diff.e{background:var(--ok)}.diff.m{background:var(--gold)}.diff.h{background:var(--bad)}
  .prob{border-right:1px solid var(--border);overflow:auto;min-height:0;padding:20px 24px 44px}
  .prob h1{font-family:var(--display);font-weight:700;font-size:23px;margin:0 0 4px;line-height:1.15}
  .ptag{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-bottom:16px}
  .prob h3{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--coral);font-family:var(--mono);margin:20px 0 8px}
  .prob p{font-size:14px;line-height:1.6;color:#cdd9d6;margin:0 0 10px}
  .prob ul{font-size:13.5px;line-height:1.55;color:#cdd9d6;padding-left:18px;margin:0}.prob li{margin:3px 0}
  .prob code{font-family:var(--mono);background:var(--panel);padding:1px 5px;border-radius:4px;color:var(--gold);font-size:12.5px}
  .src{margin:10px 0}.src .nm{font-family:var(--mono);font-size:11.5px;color:var(--mint);margin-bottom:4px}.src .nm b{color:var(--text)}
  table.dt{border-collapse:collapse;font-family:var(--mono);font-size:11.5px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
  table.dt th{background:var(--panel);color:var(--muted);text-align:left;padding:5px 9px;border-bottom:1px solid var(--border);font-weight:600}
  table.dt td{padding:4px 9px;border-bottom:1px solid var(--border);color:#c2d0cd}table.dt tr:last-child td{border-bottom:0}
  .srcnote{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:3px}
  .exp{font-family:var(--mono);font-size:11.5px;background:var(--surface);border:1px dashed var(--border);border-radius:8px;padding:9px 11px;color:var(--mint);white-space:pre;overflow:auto}
  .opt{display:block;border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin:8px 0;cursor:pointer;font-size:13.5px;transition:.12s;background:var(--surface)}
  .opt:hover{border-color:var(--coral)}.opt.sel{border-color:var(--coral);background:var(--panel)}
  .opt.correct{border-color:var(--mint);background:rgba(94,234,212,.08)}.opt.wrong{border-color:var(--bad);background:rgba(255,92,119,.08)}
  .opt .mk{font-family:var(--mono);color:var(--muted);margin-right:8px}
  .work{display:flex;flex-direction:column;min-height:0;min-width:0}
  .wtabs{display:flex;align-items:center;background:var(--surface);border-bottom:1px solid var(--border)}
  .wtab{font-family:var(--mono);font-size:11.5px;padding:9px 14px;color:var(--muted);cursor:pointer;border-right:1px solid var(--border)}
  .wtab.active{color:var(--text);background:var(--ink);box-shadow:inset 0 -2px 0 var(--coral)}
  .timer{margin-left:auto;display:flex;align-items:center;gap:7px;padding:0 12px;font-family:var(--mono);font-size:13px}
  .clock{font-weight:600;color:var(--mint);font-variant-numeric:tabular-nums}.clock.warn{color:var(--gold)}.clock.crit{color:var(--bad);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.45}}
  .timer button,.exam-bar button{padding:3px 8px;font-size:11px}
  .edhost{flex:1;min-height:120px;position:relative}
  .CodeMirror{height:100%!important;font-family:var(--mono)!important;font-size:13px;background:var(--editorbg)!important}
  .actions{display:flex;gap:8px;padding:9px 12px;background:var(--surface);border-top:1px solid var(--border);flex-wrap:wrap}
  button{font-family:var(--ui);font-weight:600;font-size:13px;border-radius:9px;cursor:pointer;border:1px solid var(--border);background:var(--panel);color:var(--text);padding:8px 13px;transition:.12s}
  button:hover{border-color:var(--coral);color:#fff}
  button.primary{background:var(--coral);color:var(--onprimary);border-color:var(--coral)}button.primary:hover{filter:brightness(1.07)}
  button.ghost{background:transparent}button:disabled{opacity:.5;cursor:not-allowed}
  .results{height:40%;min-height:130px;overflow:auto;background:var(--surface);border-top:1px solid var(--border);font-family:var(--mono);font-size:12px}
  .rhd{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);color:var(--muted);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;position:sticky;top:0;background:var(--surface)}
  .verdict{margin-left:auto;font-weight:600}.verdict.pass{color:var(--mint)}.verdict.fail{color:var(--bad)}
  .case{display:flex;gap:9px;padding:8px 12px;border-bottom:1px solid var(--border);align-items:flex-start}
  .case .s{flex:none;font-weight:700}.case.pass .s{color:var(--mint)}.case.fail .s{color:var(--bad)}
  .case .d{color:#c8d6d3;line-height:1.45;white-space:pre-wrap;word-break:break-word}.case .d small{color:var(--muted)}
  .console{padding:10px 12px;color:var(--muted);white-space:pre-wrap;line-height:1.45}
  .tutor{padding:12px;border-top:1px solid var(--border);background:var(--panel);white-space:pre-wrap;font-family:var(--ui);font-size:13.5px;line-height:1.6;display:none}
  .tutor.show{display:block}.tutor code{font-family:var(--mono);background:var(--ink);padding:1px 5px;border-radius:4px;color:var(--gold)}
  .pulse{animation:pulse 1s infinite}@keyframes pulse{50%{opacity:.45}}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--coral);padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:60}
  .toast.show{opacity:1}
  /* overlays */
  .overlay{position:absolute;left:0;right:0;top:0;bottom:0;background:var(--ink);overflow:auto;display:none;z-index:30;padding:28px 30px}
  .overlay.show{display:block}
  .overlay h2{font-family:var(--display);font-weight:700;font-size:25px;margin:0 0 4px}
  .overlay .sub{color:var(--muted);font-size:13px;margin-bottom:20px;font-family:var(--mono)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px}
  .field{margin:14px 0}.field:first-child{margin-top:0}
  .field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip2{padding:7px 12px;border:1px solid var(--border);border-radius:999px;font-size:12.5px;cursor:pointer;background:var(--panel);color:var(--text)}
  .chip2.on{border-color:var(--coral);color:var(--coral)}
  .exam-bar{display:flex;align-items:center;gap:12px;width:100%;padding:0 10px;font-family:var(--mono);font-size:12px}
  .dots{display:flex;gap:5px;flex-wrap:wrap;max-width:46%}
  .dots i{width:9px;height:9px;border-radius:50%;background:var(--panel);border:1px solid var(--border);display:inline-block}
  .dots i.cur{border-color:var(--coral);box-shadow:0 0 6px var(--coral)}.dots i.pass{background:var(--mint);border-color:var(--mint)}.dots i.fail{background:var(--bad);border-color:var(--bad)}
  .gclock{font-weight:600;color:var(--mint);font-variant-numeric:tabular-nums}.gclock.warn{color:var(--gold)}.gclock.crit{color:var(--bad);animation:blink 1s infinite}
  .score{font-family:var(--display);font-size:50px;font-weight:900;line-height:1}
  .scoresub{color:var(--muted);font-family:var(--mono);font-size:12px;margin-top:6px}
  .row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
  .row .lab{width:210px;color:#c8d6d3;font-size:12.5px}.row .track{flex:1;height:9px;background:var(--panel);border-radius:99px;overflow:hidden;border:1px solid var(--border)}
  .row .fill{display:block;height:100%;background:linear-gradient(90deg,var(--coral),var(--gold))}.row .pct{width:58px;text-align:right;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .weak{border:1px solid var(--bad);background:rgba(255,92,119,.07);border-radius:10px;padding:12px 14px;margin-top:16px;font-size:13.5px;line-height:1.5}
  .hist .h{display:flex;gap:14px;padding:8px 0;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:12px;color:#c8d6d3}
  .menub{display:none}
  @media(max-width:1080px){.grid{grid-template-columns:1fr 1fr}.rail{position:fixed;z-index:50;width:288px;height:100%;transform:translateX(-100%);transition:.25s}.rail.open{transform:translateX(0)}.menub{display:grid;place-items:center;width:36px;height:36px;border-radius:9px;background:var(--coral);color:var(--onprimary);border:none;cursor:pointer;font-size:17px}.rail.hide{display:none}.grid.examrun{grid-template-columns:1fr 1fr}}
  @media(min-width:1081px){.rail.hide{display:none}.grid.examrun{grid-template-columns:1fr 1fr}}
  @media(max-width:720px){.gridview.show{grid-template-columns:1fr;grid-auto-rows:minmax(200px,auto);overflow:auto}.prob{border-right:0;border-bottom:1px solid var(--border)}.nav{display:none}}
</style>
</head>
<body>
<div class="top">
  <button class="menub" id="menub">☰</button>
  <div class="brand" onclick="switchMode('home')"><span class="dot"></span>DE<em>Lab</em></div>
  <div class="nav" id="nav">
    <button class="navbtn" data-m="home">Inicio</button>
    <button class="navbtn" data-m="guide">Guía</button>
    <button class="navbtn" data-m="practice">Práctica</button>
    <button class="navbtn" data-m="exam">Examen</button>
    <button class="navbtn" data-m="stats">Stats</button>
  </div>
  <div class="spacer"></div>
  <div class="lang"><button id="langEs" class="on" onclick="setLang('es')">ES</button><button id="langEn" onclick="setLang('en')">EN</button></div>
  <div class="xpmini">Lv <b id="lvl">1</b> · <span id="xptxt">0 XP</span></div>
  <button class="ghostbtn" id="themeBtn" title="theme">🌙</button>
  <button class="ghostbtn" id="resetBtn">reset</button>
</div>

<!-- HOME -->
<div class="view show" id="home"></div>

<!-- GUIDE -->
<div class="view" id="guideView">
  <div class="guideWrap">
    <div class="gtop"><b id="gTitle">Guía de entrevista DE</b><span style="flex:1"></span>
      <a class="ghostbtn" href="https://crabb-beltran.github.io/de-interview-guide/" target="_blank" rel="noopener" id="gOpen">abrir en pestaña ↗</a>
      <button class="ghostbtn" onclick="switchMode('home')" id="gBack">← inicio</button></div>
    <iframe id="guideFrame" title="DE Interview Guide" loading="lazy"></iframe>
  </div>
</div>

<!-- PRACTICE / EXAM GRID -->
<div class="gridview grid" id="gridv" style="position:relative">
  <aside class="rail" id="rail"></aside>
  <section class="prob" id="prob"></section>
  <section class="work">
    <div class="wtabs" id="wtabs"></div>
    <div class="edhost" id="edhost"></div>
    <div class="actions" id="actions"></div>
    <div class="results" id="results">
      <div class="rhd"><span id="rhdLabel">test cases</span> <span class="verdict" id="verdict"></span></div>
      <div id="cases"><div class="console"></div></div>
      <div class="tutor" id="tutor"></div>
    </div>
  </section>
  <div class="overlay" id="ovSetup"></div>
  <div class="overlay" id="ovReport"></div>
  <div class="overlay" id="ovStats"></div>
</div>

<div class="toast" id="toast"></div>

<script>

const DT={e:480,m:900,h:1500}; // default timer seconds by difficulty
/* ===== helper to build source tables compactly ===== */
function S(name,cols,rows,note){return {name,cols,rows,note};}

const EX=[
/* ============================ SQL ============================ */
{
 id:'sql_topn',cat:'D · SQL avanzado',kind:'sql',diff:'m',xp:20,
 title:'2.º salario más alto por departamento',tags:'window · DENSE_RANK',
 context:'RR.HH. pide, por equipo, el segundo salario más alto para una banda salarial. Si dos personas ganan lo mismo, cuenta como un solo nivel.',
 task:'Devuelve por <code>dept</code> el <b>segundo salario más alto distinto</b>.',
 bullets:['Salida: <code>dept</code>, <code>second_salary</code>.','Salarios repetidos = un solo nivel (usa <code>DENSE_RANK</code> sobre valores distintos).','Si un dept no tiene 2.º distinto, se omite. Orden libre.'],
 sources:[S('employees',['id','name','dept','salary'],[[1,'A','data',100],[2,'B','data',100],[3,'C','data',90],[4,'D','data',80],['…','…','plat / ml','…']])],
 expected:'dept   second_salary\ndata   90\nml     55',
 datasets:[`CREATE TABLE employees(id INT,name TEXT,dept TEXT,salary INT);INSERT INTO employees VALUES (1,'A','data',100),(2,'B','data',100),(3,'C','data',90),(4,'D','data',80),(5,'E','plat',70),(6,'F','plat',70),(7,'G','ml',50),(8,'H','ml',60),(9,'I','ml',55);`,
           `CREATE TABLE employees(id INT,name TEXT,dept TEXT,salary INT);INSERT INTO employees VALUES (1,'X','x',10),(2,'Y','x',20),(3,'Z','y',5);`],
 ref:`WITH r AS (SELECT dept,salary,DENSE_RANK() OVER(PARTITION BY dept ORDER BY salary DESC) rk FROM (SELECT DISTINCT dept,salary FROM employees)) SELECT dept, salary AS second_salary FROM r WHERE rk=2`,
 starter:`-- second highest DISTINCT salary per dept\nSELECT\n  dept,\n  -- ...\nFROM employees\n;`
},
{
 id:'sql_dedup',cat:'C · Transformación y DQ',kind:'sql',diff:'m',xp:20,
 title:'Deduplicación idempotente: quedarse con el más reciente',tags:'idempotencia · ROW_NUMBER',
 context:'Un loader reintentó y escribió duplicados por <code>event_id</code>. Antes de hacer MERGE a Silver necesitas una sola fila por evento: la última versión.',

const CAT=[{k:'sql',es:'SQL Avanzado',en:'Advanced SQL'},{k:'joins',es:'SQL · Joins y CTEs',en:'SQL · Joins & CTEs'},{k:'pandas',es:'pandas',en:'pandas'},{k:'pydb',es:'Python + Bases de Datos',en:'Python + Databases'},{k:'logic',es:'Lógica y Algoritmos',en:'Logic & Algorithms'},{k:'comp',es:'Competitivo (Hackathon)',en:'Competitive (Hackathon)'},{k:'dq',es:'Calidad de Datos',en:'Data Quality'},{k:'model',es:'Modelado',en:'Data Modeling'},{k:'arch',es:'Arquitectura y Cloud',en:'Architecture & Cloud'},{k:'stats',es:'Estadística',en:'Statistics'},{k:'nosql',es:'NoSQL',en:'NoSQL'},{k:'dba',es:'DBA / Administración',en:'DBA / Administration'}];
function catKey(e){return CATMAP[e.cat]||e.cat;}
function catLabel(k){const c=CAT.find(x=>x.k===k);return c?c[lang]:k;}
function orderedCats(){const present=[...new Set(EX.map(catKey))];const ord=CAT.map(c=>c.k).filter(k=>present.includes(k));present.forEach(k=>{if(!ord.includes(k))ord.push(k);});return ord;}
/* field resolver: EN overlay > inline {es,en} > raw */
function fld(e,key){if(lang==='en'&&typeof EN!=='undefined'&&EN[e.id]&&EN[e.id][key]!=null)return EN[e.id][key];return L(e[key]);}
function optText(e,i){if(lang==='en'&&typeof EN!=='undefined'&&EN[e.id]&&EN[e.id].options)return EN[e.id].options[i];return L(e.options[i].t);}
function explainText(e){if(lang==='en'&&typeof EN!=='undefined'&&EN[e.id]&&EN[e.id].explain!=null)return EN[e.id].explain;return L(e.explain);}

const levelFor=xp=>Math.floor(xp/100)+1;

async function award(ex){
  if(mode==='exam')return;
  if(state.solved[ex.id]){toast(t('already'));return;}
  let gain=ex.xp,note='';
  if(timer.expired){gain=Math.floor(ex.xp/2);note=' (½ XP)';}
  state.solved[ex.id]=true;state.xp+=gain;
  if(!timer.expired){const d=new Date().toISOString().slice(0,10);if(state.lastDay!==d){state.streak=(state.lastDay&&(new Date(d)-new Date(state.lastDay))===86400000)?state.streak+1:1;state.lastDay=d;}}
  stopTimer();renderXP();renderRail();await save();
  toast(`✓ +${gain} ${t('toast_xp')} · ${L(ex.title)}${note}`);
}

function paintClock(){const c=$('#clock');if(!c)return;c.textContent=fmt(timer.remaining);c.className='clock'+(timer.remaining<=15?' crit':timer.remaining<=60?' warn':'');}
function startTimer(sec){stopTimer();timer={remaining:sec,id:null,paused:false,expired:false};paintClock();timer.id=setInterval(()=>{if(timer.paused)return;timer.remaining--;paintClock();if(timer.remaining<=0){clearInterval(timer.id);timer.id=null;timer.expired=true;paintClock();toast(t('toast_timeup'));}},1000);}
function stopTimer(){if(timer.id){clearInterval(timer.id);timer.id=null;}}

function showCases(list){const pass=list.filter(c=>c.ok).length,all=pass===list.length&&list.length>0;$('#verdict').textContent=`${pass}/${list.length}`;$('#verdict').className='verdict '+(all?'pass':'fail');$('#cases').innerHTML=list.map(c=>`<div class="case ${c.ok?'pass':'fail'}"><span class="s">${c.ok?'✓':'✗'}</span><span class="d">${c.name}${c.detail?`<br><small>${c.detail}</small>`:''}</span></div>`).join('');return all;}
function showConsole(m){$('#cases').innerHTML=`<div class="console">${m}</div>`;$('#verdict').textContent='';}

async function ensureSQL(){if(SQL)return SQL;SQL=await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${f}`});return SQL;}
function rowsEq(a,b,o){const n=r=>JSON.stringify(r);if(a.length!==b.length)return false;if(o)return a.every((r,i)=>n(r)===n(b[i]));const sa=a.map(n).sort(),sb=b.map(n).sort();return sa.every((v,i)=>v===sb[i]);}
function exec(db,sql){const r=db.exec(sql);return r.length?{cols:r[0].columns,rows:r[0].values}:{cols:[],rows:[]};}
function preview(r){const x=r.rows.slice(0,3).map(row=>'['+row.join(',')+']').join(' ');return (x||'∅')+(r.rows.length>3?' …':'');}
async function runSQL(){
  const e=cur,userSQL=editor.getValue().trim().replace(/;+\s*$/,'');
  if(!userSQL){showConsole(t('write_q'));return false;}
  let lib;try{lib=await ensureSQL();}catch(err){showConsole(t('sql_fail')+': '+err);return false;}
  const cases=[],ordered=/order\s+by/i.test(e.ref);
  for(let i=0;i<e.datasets.length;i++){const db=new lib.Database();
    try{db.run(e.datasets[i]);let exp;try{exp=exec(db,e.ref);}catch(err){cases.push({name:`dataset ${i+1}`,ok:false,detail:'ref error: '+err});db.close();continue;}
      let got;try{got=exec(db,userSQL);}catch(err){cases.push({name:`dataset ${i+1}`,ok:false,detail:'SQL error: '+err});db.close();continue;}
      const ok=rowsEq(got.rows,exp.rows,ordered);
      cases.push({name:`dataset ${i+1} · ${exp.rows.length} ${t('rows')}`,ok,detail:ok?'':`${t('got')}: ${preview(got)} | ${t('expected')}: ${preview(exp)}`});
    }finally{db.close();}}
  const all=showCases(cases);if(all)await award(e);return all;
}
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error('load fail '+src));document.head.appendChild(s);});}
async function ensurePy(){if(pyodide)return pyodide;if(pyLoading)return pyLoading;showConsole(t('loading_py')+' <span class="pulse">●</span>');pyLoading=(async()=>{await loadScript('https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js');pyodide=await loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.26.2/full/'});return pyodide;})();return pyLoading;}
async function runPy(){
  const e=cur;let py;try{py=await ensurePy();}catch(err){showConsole(t('py_blocked')+'<br><small>'+err.message+'</small>');return false;}
  if(e.pyPackages){try{showConsole(t('loading_pkg')+': '+e.pyPackages.join(', ')+'… <span class="pulse">●</span>');await py.loadPackage(e.pyPackages);}catch(err){showConsole('pkg error: '+err);return false;}}
  const code=editor.getValue()+'\n'+e.pytests+'\nimport json\nprint("__RESULTS__"+json.dumps(cases))';
  let out='';py.setStdout({batched:s=>out+=s+'\n'});
  try{await py.runPythonAsync(code);}catch(err){showConsole('Error:\n'+(err.message||err));return false;}
  const m=out.indexOf('__RESULTS__');if(m<0){showConsole(t('no_res')+'\n'+out);return false;}
  let list;try{list=JSON.parse(out.slice(m+11));}catch(err){showConsole(out);return false;}
  const cases=list.map(c=>({name:c.name,ok:c.ok,detail:c.ok?'':`${t('got')} ${c.got} · ${t('expected')} ${c.expected}`}));
  const all=showCases(cases);if(all)await award(e);return all;
}
function runQuiz(){const e=cur;if(quizSel==null){showConsole(t('choose'));return;}answered=true;document.querySelectorAll('.opt').forEach((o,i)=>{o.classList.remove('sel');if(e.options[i].ok)o.classList.add('correct');if(i===quizSel&&!e.options[i].ok)o.classList.add('wrong');});const ok=e.options[quizSel].ok;showCases([{name:ok?t('correct'):t('incorrect'),ok,detail:explainText(e)}]);if(ok)award(e);}
function runTests(){if(!cur)return;if(cur.kind==='sql')return runSQL();if(cur.kind==='python')return runPy();if(cur.kind==='quiz')return runQuiz();}

async function ai(modeAi){const e=cur,panel=$('#tutor');panel.classList.add('show','pulse');panel.textContent='…';
  const code=e.kind==='quiz'?'(conceptual)':(editor?editor.getValue():'');

  try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const d=await r.json();const txt=(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();panel.classList.remove('pulse');panel.textContent=txt||'—';
  }catch(err){panel.classList.remove('pulse');panel.textContent=t('tutor_off')+': '+err.message;}}

function catAccuracy(){const acc={};orderedCats().forEach(k=>acc[k]={p:0,t:0});
  stats.history.forEach(a=>{Object.entries(a.byCat||{}).forEach(([k,o])=>{if(!acc[k])acc[k]={p:0,t:0};acc[k].p+=o.p;acc[k].t+=o.t;});});return acc;}
function weakness(k){const a=catAccuracy()[k];if(!a||a.t===0){const items=EX.filter(e=>catKey(e)===k);if(!items.length)return .5;const s=items.filter(e=>state.solved[e.id]).length;return 1-(s/items.length);}return 1-(a.p/a.t);}
function buildSetup(){
  const cats=orderedCats();setupCfg={cats:new Set(cats),count:10,diff:'all',spaced:false};
  const spLabel=lang==='en'?'Spaced repetition — prioritize my weak categories':'Repetición espaciada — priorizar mis categorías débiles';
  $('#ovSetup').innerHTML=`<h2>${t('setup_t')}</h2><div class="sub">${t('setup_sub')}</div>
    <div class="card" style="max-width:820px">
      <div class="field"><label>${t('f_cats')}</label><div class="chips" id="setCats">${cats.map(k=>`<span class="chip2 on" data-c="${k}">${catLabel(k)}</span>`).join('')}</div></div>
      <div class="field"><label>${t('f_count')}</label><div class="chips" id="setCount"><span class="chip2" data-n="5">5</span><span class="chip2 on" data-n="10">10</span><span class="chip2" data-n="15">15</span><span class="chip2" data-n="all">${t('all')}</span></div></div>
      <div class="field"><label>${t('f_diff')}</label><div class="chips" id="setDiff"><span class="chip2 on" data-d="all">${t('all')}</span><span class="chip2" data-d="e">Easy</span><span class="chip2" data-d="m">Medium</span><span class="chip2" data-d="h">Hard</span></div></div>
      <div class="field"><div class="chips"><span class="chip2" id="setSpaced">🎯 ${spLabel}</span></div></div>
      <div style="margin-top:18px"><button class="primary" onclick="startExam()">${t('start')}</button></div>
    </div>`;
  $('#setCats').querySelectorAll('.chip2').forEach(ch=>ch.onclick=()=>{ch.classList.toggle('on');const c=ch.dataset.c;setupCfg.cats.has(c)?setupCfg.cats.delete(c):setupCfg.cats.add(c);});
  $('#setCount').querySelectorAll('.chip2').forEach(ch=>ch.onclick=()=>{$('#setCount').querySelectorAll('.chip2').forEach(x=>x.classList.remove('on'));ch.classList.add('on');setupCfg.count=ch.dataset.n==='all'?999:+ch.dataset.n;});
  $('#setDiff').querySelectorAll('.chip2').forEach(ch=>ch.onclick=()=>{$('#setDiff').querySelectorAll('.chip2').forEach(x=>x.classList.remove('on'));ch.classList.add('on');setupCfg.diff=ch.dataset.d;});
  $('#setSpaced').onclick=()=>{setupCfg.spaced=!setupCfg.spaced;$('#setSpaced').classList.toggle('on',setupCfg.spaced);};
}
function startExam(){
  let pool=EX.filter(e=>setupCfg.cats.has(catKey(e)));if(setupCfg.diff!=='all')pool=pool.filter(e=>e.diff===setupCfg.diff);
  if(!pool.length){toast(t('nofilter'));return;}
  if(setupCfg.spaced){const w={};orderedCats().forEach(k=>w[k]=weakness(k));pool=pool.map(e=>[e,w[catKey(e)]+Math.random()*0.25]).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);}
  else pool=pool.slice().sort(()=>Math.random()-0.5);
  const items=pool.slice(0,Math.min(setupCfg.count,pool.length));
  const total=items.reduce((s,e)=>s+(e.timer||DT[e.diff]),0);
  exam={items,idx:0,results:{},times:{},start:Date.now(),qStart:Date.now(),total,finished:false};
  $('#ovSetup').classList.remove('show');document.querySelector('.rail').classList.add('hide');$('#gridv').classList.add('examrun');
  startExamTimer(total);loadExamQuestion(0);
}
function examDots(){return exam.items.map((e,i)=>{let cl='';if(i===exam.idx)cl='cur';else if(exam.results[e.id])cl=exam.results[e.id].ok?'pass':'fail';return `<i class="${cl}"></i>`;}).join('');}
function paintExamClock(){const c=$('#examClock');if(!c||!exam)return;c.textContent=fmt(examTimer.remaining);c.className='gclock'+(examTimer.remaining<=30?' crit':examTimer.remaining<=120?' warn':'');}
function startExamTimer(sec){stopExamTimer();examTimer.remaining=sec;paintExamClock();examTimer.id=setInterval(()=>{examTimer.remaining--;paintExamClock();if(examTimer.remaining<=0){stopExamTimer();toast(t('toast_examtime'));finishExam();}},1000);}
function stopExamTimer(){if(examTimer.id){clearInterval(examTimer.id);examTimer.id=null;}}
function loadExamQuestion(i){
  exam.idx=i;cur=exam.items[i];answered=false;quizSel=null;exam.qStart=Date.now();renderProblem();
  const e=cur,tabs=$('#wtabs'),host=$('#edhost'),act=$('#actions');
  tabs.innerHTML=`<div class="exam-bar"><b>${t('exam_q')} ${i+1}/${exam.items.length}</b><span class="dots">${examDots()}</span><span style="margin-left:auto" class="gclock" id="examClock">--:--</span><button id="examFinish">${t('exam_finish')}</button></div>`;
  $('#examFinish').onclick=()=>{if(confirm(t('exam_finish_c')))finishExam();};
  if(e.kind==='quiz'){host.innerHTML=`<div style="padding:18px;color:var(--muted);font-family:var(--mono);font-size:12.5px">${t('exam_quiz_note')}</div>`;editor=null;}
  else{host.innerHTML='';editor=CodeMirror(host,{value:e.starter,mode:e.kind==='sql'?'text/x-sql':'python',theme:'material-darker',lineNumbers:true,lineWrapping:true,indentUnit:e.kind==='python'?4:2});setTimeout(()=>editor.refresh(),40);}
  const runBtn=e.kind!=='quiz'?`<button id="examRun">${t('exam_run')}</button>`:'';
  act.innerHTML=`<button class="primary" id="examNext">${t('exam_next')}</button>${runBtn}<button class="ghost" id="examSkip">${t('exam_skip')}</button>`;
  $('#examNext').onclick=examSubmit;$('#examSkip').onclick=examSkip;
  if(e.kind!=='quiz'){const er=$('#examRun');if(er)er.onclick=()=>{e.kind==='sql'?runSQL():runPy();};}
  $('#cases').innerHTML=`<div class="console">${t('exam_prompt')}</div>`;$('#verdict').textContent='';$('#tutor').classList.remove('show');paintExamClock();
}
async function examSubmit(){const e=cur;let ok=false;if(e.kind==='quiz'){if(quizSel==null){toast(t('exam_choose'));return;}ok=!!e.options[quizSel].ok;showConsole((ok?'✓ ':'✗ ')+t('registered'));}else{ok=await(e.kind==='sql'?runSQL():runPy());}exam.results[e.id]={ok,cat:e.cat,diff:e.diff,kind:e.kind};exam.times[e.id]=Math.round((Date.now()-exam.qStart)/1000);advanceExam();}
function examSkip(){const e=cur;exam.results[e.id]={ok:false,skipped:true,cat:e.cat,diff:e.diff,kind:e.kind};exam.times[e.id]=Math.round((Date.now()-exam.qStart)/1000);advanceExam();}
function advanceExam(){if(exam.idx<exam.items.length-1)loadExamQuestion(exam.idx+1);else finishExam();}
function finishExam(){
  if(!exam||exam.finished)return;exam.finished=true;stopExamTimer();
  exam.items.forEach(e=>{if(!exam.results[e.id])exam.results[e.id]={ok:false,skipped:true,cat:e.cat,diff:e.diff,kind:e.kind};});
  const total=exam.items.length,pass=exam.items.filter(e=>exam.results[e.id].ok).length,byCat={},byDiff={};
  exam.items.forEach(e=>{const r=exam.results[e.id],ck=catKey(e);(byCat[ck]=byCat[ck]||{p:0,t:0}).t++;if(r.ok)byCat[ck].p++;(byDiff[e.diff]=byDiff[e.diff]||{p:0,t:0}).t++;if(r.ok)byDiff[e.diff].p++;});
  const dur=Math.round((Date.now()-exam.start)/1000);
  const a={date:new Date().toISOString(),score:pass,total,pct:Math.round(pass/total*100),dur,byCat,byDiff};
  stats.history.unshift(a);saveStats();renderReport(a);
}
function renderReport(a){
  const cats=Object.entries(a.byCat).sort((x,y)=>(x[1].p/x[1].t)-(y[1].p/y[1].t));
  const weak=cats.filter(([c,o])=>o.p/o.t<0.6);
  const catRows=cats.map(([c,o])=>{const pct=Math.round(o.p/o.t*100);return `<div class="row"><span class="lab">${catLabel(c)}</span><span class="track"><span class="fill" style="width:${pct}%"></span></span><span class="pct">${o.p}/${o.t}</span></div>`}).join('');
  const diffRows=['e','m','h'].filter(d=>a.byDiff[d]).map(d=>{const o=a.byDiff[d],pct=Math.round(o.p/o.t*100);return `<div class="row"><span class="lab">${dl(d)}</span><span class="track"><span class="fill" style="width:${pct}%"></span></span><span class="pct">${o.p}/${o.t}</span></div>`}).join('');
  const qlist=exam.items.map((e,i)=>{const r=exam.results[e.id];return `<div class="case ${r.ok?'pass':'fail'}"><span class="s">${r.ok?'✓':'✗'}</span><span class="d">${i+1}. ${fld(e,"title")} <small>· ${e.cat} · ${e.kind.toUpperCase()} · ${exam.times[e.id]||0}s${r.skipped?' · '+t('skipped'):''}</small></span></div>`}).join('');
  const col=a.pct>=70?'var(--mint)':a.pct>=50?'var(--gold)':'var(--bad)';
  $('#ovReport').innerHTML=`<h2>${t('rep_title')}</h2><div class="sub">${new Date(a.date).toLocaleString()} · ${t('rep_dur')} ${fmt(a.dur)}</div>
    <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start">
      <div class="card" style="min-width:190px;text-align:center"><div class="score" style="color:${col}">${a.pct}%</div><div class="scoresub">${a.score} / ${a.total} ${t('rep_correct')}</div></div>
      <div class="card" style="flex:1;min-width:330px"><div class="field"><label>${t('rep_bycat')}</label>${catRows}</div><div class="field"><label>${t('rep_bydiff')}</label>${diffRows}</div></div>
    </div>
    ${weak.length?`<div class="weak"><b>${t('rep_weak')}</b> ${weak.map(([c])=>c).join(' · ')}.<br>${t('rep_weak2')}</div>`:`<div class="weak" style="border-color:var(--mint);background:rgba(94,234,212,.07)"><b>${t('rep_solid')}</b> ${t('rep_solid2')}</div>`}
    <div class="card" style="margin-top:16px"><div class="field"><label>${t('rep_detail')}</label><div style="font-family:var(--mono)">${qlist}</div></div></div>
    <div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap"><button class="primary" onclick="switchMode('exam')">${t('rep_new')}</button><button onclick="switchMode('stats')">${t('rep_prog')}</button><button class="ghost" onclick="switchMode('practice')">${t('rep_prac')}</button></div>`;
  $('#gridv').classList.remove('examrun');$('#ovReport').classList.add('show');
}
function renderStats(){
  const h=stats.history,ordCats=orderedCats(),m={};ordCats.forEach(k=>m[k]={s:0,t:0});EX.forEach(e=>{const k=catKey(e);if(m[k])m[k].t++;if(state.solved[e.id]&&m[k])m[k].s++;});
  const mastery=ordCats.map(k=>{const o=m[k]||{s:0,t:0},pct=o.t?Math.round(o.s/o.t*100):0;return `<div class="row"><span class="lab">${catLabel(k)}</span><span class="track"><span class="fill" style="width:${pct}%"></span></span><span class="pct">${o.s}/${o.t}</span></div>`}).join('');
  const best=h.length?Math.max(...h.map(a=>a.pct)):0;
  const rows=h.slice(0,15).map(a=>`<div class="h"><span style="width:170px">${new Date(a.date).toLocaleString()}</span><span style="width:54px;color:${a.pct>=70?'var(--mint)':a.pct>=50?'var(--gold)':'var(--bad)'}">${a.pct}%</span><span style="width:60px">${a.score}/${a.total}</span><span>${fmt(a.dur)}</span></div>`).join('')||`<div class="console">${t('stats_none')}</div>`;
  $('#ovStats').innerHTML=`<h2>${t('stats_title')}</h2><div class="sub">${t('stats_sub')}</div>
    <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start">
      <div class="card" style="min-width:180px;text-align:center"><div class="score">Lv ${levelFor(state.xp)}</div><div class="scoresub">${state.xp} XP · 🔥 ${state.streak}<br>${t('stats_best')}: ${best}%</div></div>
      <div class="card" style="flex:1;min-width:340px"><div class="field"><label>${t('stats_mastery')}</label>${mastery}</div></div>
    </div>
    <div class="card" style="margin-top:16px"><div class="field"><label>${t('stats_hist')}</label><div class="hist">${rows}</div></div></div>
    <div style="margin-top:16px;display:flex;gap:10px"><button class="primary" onclick="switchMode('exam')">${t('stats_start')}</button><button class="ghost" onclick="switchMode('practice')">${t('nav_practice')}</button></div>`;
}

/* ===========================  persistence + init  =========================== */
async function save(){try{await window.storage.set('delab:state',JSON.stringify(state),false);}catch(e){}}
async function load(){try{const r=await window.storage.get('delab:state',false);if(r&&r.value)state=Object.assign(state,JSON.parse(r.value));}catch(e){}}
async function saveStats(){try{await window.storage.set('delab:stats',JSON.stringify(stats),false);}catch(e){}}
async function loadStats(){try{const r=await window.storage.get('delab:stats',false);if(r&&r.value)stats=Object.assign({history:[]},JSON.parse(r.value));}catch(e){}}
async function saveLang(){try{await window.storage.set('delab:lang',lang,false);}catch(e){}}
async function loadLang(){try{const r=await window.storage.get('delab:lang',false);if(r&&r.value)lang=r.value;}catch(e){}}
function toast(m){const el=$('#toast');el.innerHTML=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2400);}

document.querySelectorAll('#nav .navbtn').forEach(b=>b.onclick=()=>switchMode(b.dataset.m));
$('#themeBtn').onclick=()=>{const ld=document.documentElement.getAttribute('data-theme')==='light';document.documentElement.setAttribute('data-theme',ld?'':'light');$('#themeBtn').textContent=ld?'🌙':'☀️';try{window.storage.set('delab:theme',ld?'dark':'light',false);}catch(e){}};
$('#menub').onclick=()=>document.querySelector('.rail').classList.toggle('open');
$('#resetBtn').onclick=async()=>{if(confirm(t('reset_c'))){state={solved:{},xp:0,streak:0,lastDay:null};stats={history:[]};await save();await saveStats();renderXP();if(mode==='practice')renderRail();if(mode==='stats')renderStats();}};

window.addEventListener('load',async()=>{
  await load();await loadStats();await loadLang();
  try{const th=await window.storage.get('delab:theme',false);if(th&&th.value==='light'){document.documentElement.setAttribute('data-theme','light');$('#themeBtn').textContent='☀️';}}catch(e){}
  setLang(lang);renderXP();renderRail();switchMode('home');
});

</script>
</body>
</html>
