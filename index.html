<title>DE Dojo — entrenamiento DE con test cases</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">

<style>
  :root{--ink:#0D1117;--surface:#161B22;--surface2:#1B222B;--border:#222A33;--text:#E6EDF3;--muted:#8B98A5;
    --amber:#FFB454;--ok:#3FB950;--bad:#F85149;--blue:#58A6FF;--violet:#BC8CFF;
    --ui:'Space Grotesk',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;}
  *{box-sizing:border-box}html,body{height:100%;margin:0}
  body{background:var(--ink);color:var(--text);font-family:var(--ui);display:grid;grid-template-rows:auto 1fr;overflow:hidden}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  .top{display:flex;align-items:center;gap:14px;padding:9px 16px;border-bottom:1px solid var(--border);background:var(--surface)}
  .brand{font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:9px}
  .brand .k{color:var(--amber)} .brand small{font-family:var(--mono);font-weight:500;color:var(--muted);font-size:11px}
  .spacer{flex:1}
  .xpwrap{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .lvl{color:var(--amber);font-weight:600}
  .pbar{width:130px;height:7px;background:var(--surface2);border-radius:99px;overflow:hidden;border:1px solid var(--border)}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--amber),#ffd089);width:0;transition:width .4s}
  .menub{display:none}
  .grid{display:grid;grid-template-columns:290px 1fr 1fr;min-height:0;overflow:hidden}
  .rail{border-right:1px solid var(--border);background:var(--surface);overflow:auto;min-height:0}
  .cat{padding:13px 16px 6px;font-family:var(--mono);font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);position:sticky;top:0;background:var(--surface);z-index:1}
  .ex{padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;gap:10px;align-items:flex-start;transition:.12s}
  .ex:hover{background:var(--surface2)}
  .ex.active{background:var(--surface2);box-shadow:inset 3px 0 0 var(--amber)}
  .ex .ico{font-family:var(--mono);font-size:9.5px;font-weight:600;padding:2px 5px;border-radius:5px;border:1px solid var(--border);color:var(--muted);flex:none;margin-top:1px}
  .ex .ico.sql{color:var(--blue);border-color:#23405e}.ex .ico.python{color:var(--amber);border-color:#5e4a23}.ex .ico.quiz{color:var(--violet);border-color:#4a3a5e}
  .ex .tt{font-size:13px;font-weight:600;line-height:1.25}
  .ex .mt{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
  .ex .chk{margin-left:auto;color:var(--ok);flex:none}
  .diff{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--muted);margin-right:3px}
  .diff.e{background:var(--ok)}.diff.m{background:var(--amber)}.diff.h{background:var(--bad)}
  .prob{border-right:1px solid var(--border);overflow:auto;min-height:0;padding:18px 22px 40px}
  .prob h1{font-size:19px;margin:0 0 4px;line-height:1.2}
  .ptag{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-bottom:14px}
  .prob h3{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--amber);font-family:var(--mono);margin:18px 0 7px}
  .prob p{font-size:13.5px;line-height:1.6;color:#cdd6df;margin:0 0 10px}
  .prob ul{font-size:13px;line-height:1.5;color:#cdd6df;padding-left:18px;margin:0}
  .prob li{margin:3px 0}
  .prob code{font-family:var(--mono);background:var(--surface2);padding:1px 5px;border-radius:4px;color:var(--amber);font-size:12px}
  .src{margin:10px 0}
  .src .nm{font-family:var(--mono);font-size:11.5px;color:var(--blue);margin-bottom:4px}
  .src .nm b{color:var(--text)}
  table.dt{border-collapse:collapse;font-family:var(--mono);font-size:11.5px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
  table.dt th{background:var(--surface2);color:var(--muted);text-align:left;padding:5px 9px;border-bottom:1px solid var(--border);font-weight:600}
  table.dt td{padding:4px 9px;border-bottom:1px solid var(--border);color:#cbd5e1}
  table.dt tr:last-child td{border-bottom:0}
  .srcnote{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:3px}
  .exp{font-family:var(--mono);font-size:11.5px;background:var(--surface);border:1px dashed var(--border);border-radius:8px;padding:9px 11px;color:#9fb;white-space:pre;overflow:auto}
  .opt{display:block;border:1px solid var(--border);border-radius:9px;padding:10px 13px;margin:7px 0;cursor:pointer;font-size:13px;transition:.12s;background:var(--surface)}
  .opt:hover{border-color:var(--amber)} .opt.sel{border-color:var(--amber);background:var(--surface2)}
  .opt.correct{border-color:var(--ok);background:rgba(63,185,80,.08)} .opt.wrong{border-color:var(--bad);background:rgba(248,81,73,.08)}
  .opt .mk{font-family:var(--mono);color:var(--muted);margin-right:8px}
  .work{display:flex;flex-direction:column;min-height:0;min-width:0}
  .wtabs{display:flex;align-items:center;background:var(--surface);border-bottom:1px solid var(--border)}
  .wtab{font-family:var(--mono);font-size:11.5px;padding:9px 14px;color:var(--muted);cursor:pointer;border-right:1px solid var(--border)}
  .wtab.active{color:var(--text);background:var(--ink);box-shadow:inset 0 -2px 0 var(--amber)}
  .timer{margin-left:auto;display:flex;align-items:center;gap:7px;padding:0 12px;font-family:var(--mono);font-size:13px}
  .timer .clock{font-weight:600;color:var(--ok);font-variant-numeric:tabular-nums}
  .timer .clock.warn{color:var(--amber)} .timer .clock.crit{color:var(--bad);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.45}}
  .timer button{padding:3px 8px;font-size:11px}
  .edhost{flex:1;min-height:120px;position:relative}
  .CodeMirror{height:100%!important;font-family:var(--mono)!important;font-size:13px;background:var(--ink)!important}
  .actions{display:flex;gap:8px;padding:9px 12px;background:var(--surface);border-top:1px solid var(--border);flex-wrap:wrap}
  button{font-family:var(--ui);font-weight:600;font-size:13px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);padding:8px 13px;transition:.12s}
  button:hover{border-color:var(--amber);color:#fff} button.primary{background:var(--amber);color:#1a1207;border-color:var(--amber)}
  button.primary:hover{filter:brightness(1.07)} button.ghost{background:transparent} button:disabled{opacity:.5;cursor:not-allowed}
  .results{height:40%;min-height:130px;overflow:auto;background:var(--surface);border-top:1px solid var(--border);font-family:var(--mono);font-size:12px}
  .rhd{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);color:var(--muted);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;position:sticky;top:0;background:var(--surface)}
  .verdict{margin-left:auto;font-weight:600} .verdict.pass{color:var(--ok)} .verdict.fail{color:var(--bad)}
  .case{display:flex;gap:9px;padding:8px 12px;border-bottom:1px solid var(--border);align-items:flex-start}
  .case .s{flex:none;font-weight:700} .case.pass .s{color:var(--ok)} .case.fail .s{color:var(--bad)}
  .case .d{color:#cbd5e1;line-height:1.45;white-space:pre-wrap;word-break:break-word}
  .case .d small{color:var(--muted)}
  .console{padding:10px 12px;color:var(--muted);white-space:pre-wrap;line-height:1.45}
  .tutor{padding:12px;border-top:1px solid var(--border);background:var(--surface2);white-space:pre-wrap;font-family:var(--ui);font-size:13.5px;line-height:1.6;display:none}
  .tutor.show{display:block} .tutor code{font-family:var(--mono);background:var(--ink);padding:1px 5px;border-radius:4px;color:var(--amber)}
  .pulse{animation:pulse 1s infinite}@keyframes pulse{50%{opacity:.45}}
  .toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--amber);padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:60}
  .toast.show{opacity:1}
  @media(max-width:1080px){.grid{grid-template-columns:1fr 1fr}.rail{position:fixed;z-index:50;width:290px;height:100%;transform:translateX(-100%);transition:.25s}.rail.open{transform:translateX(0)}.menub{display:grid;place-items:center;width:38px;height:38px;border-radius:9px;background:var(--amber);color:#1a1207;border:none;cursor:pointer;font-size:18px}}
  @media(max-width:720px){.grid{grid-template-columns:1fr;grid-auto-rows:minmax(200px,auto);overflow:auto}body{overflow:auto}.prob{border-right:0;border-bottom:1px solid var(--border)}}
</style>
</head>
<body>
<div class="top">
  <button class="menub" onclick="document.querySelector('.rail').classList.toggle('open')">☰</button>
  <div class="brand"><span class="k">DE</span> DOJO <small>entrenamiento con test cases</small></div>
  <div class="spacer"></div>
  <div class="xpwrap">
    <span>🔥 <span id="streak">0</span></span>
    <span class="lvl">Lv <span id="lvl">1</span></span>
    <span class="pbar"><i id="xpbar"></i></span>
    <span id="xptxt">0 XP</span>
    <button class="ghost" id="resetBtn" style="padding:5px 9px;font-size:11px">reset</button>
  </div>
</div>
<div class="grid">
  <aside class="rail" id="rail"></aside>
  <section class="prob" id="prob"></section>
  <section class="work">
    <div class="wtabs" id="wtabs"></div>
    <div class="edhost" id="edhost"></div>
    <div class="actions" id="actions"></div>
    <div class="results" id="results">
      <div class="rhd">test cases <span class="verdict" id="verdict"></span></div>
      <div id="cases"><div class="console">Pulsa <b>Run tests</b> para evaluar.</div></div>
      <div class="tutor" id="tutor"></div>
    </div>
  </section>
</div>
<div class="toast" id="toast"></div>

<script>
const DT={e:480,m:900,h:1500}; // default timer seconds by difficulty
/* ===== helper to build source tables compactly ===== */
function S(name,cols,rows,note){return {name,cols,rows,note};}

const EX=[
/* ============================ SQL ============================ */
{
 id:'sql_topn',cat:'D · SQL avanzado',kind:'sql',diff:'m',xp:20,
 title:'2.º salario más alto por departamento',tags:'window · DENSE_RANK',
 context:'RR.HH. pide, por equipo, el segundo salario más alto para una banda salarial. Si dos personas ganan lo mismo, cuenta como un solo nivel.',
 task:'Devuelve por <code>dept</code> el <b>segundo salario más alto distinto</b>.',
 bullets:['Salida: <code>dept</code>, <code>second_salary</code>.','Salarios repetidos = un solo nivel (usa <code>DENSE_RANK</code> sobre valores distintos).','Si un dept no tiene 2.º distinto, se omite. Orden libre.'],
 sources:[S('employees',['id','name','dept','salary'],[[1,'A','data',100],[2,'B','data',100],[3,'C','data',90],[4,'D','data',80],['…','…','plat / ml','…']])],
 expected:'dept   second_salary\ndata   90\nml     55',
 datasets:[`CREATE TABLE employees(id INT,name TEXT,dept TEXT,salary INT);INSERT INTO employees VALUES (1,'A','data',100),(2,'B','data',100),(3,'C','data',90),(4,'D','data',80),(5,'E','plat',70),(6,'F','plat',70),(7,'G','ml',50),(8,'H','ml',60),(9,'I','ml',55);`,
           `CREATE TABLE employees(id INT,name TEXT,dept TEXT,salary INT);INSERT INTO employees VALUES (1,'X','x',10),(2,'Y','x',20),(3,'Z','y',5);`],
 ref:`WITH r AS (SELECT dept,salary,DENSE_RANK() OVER(PARTITION BY dept ORDER BY salary DESC) rk FROM (SELECT DISTINCT dept,salary FROM employees)) SELECT dept, salary AS second_salary FROM r WHERE rk=2`,
 starter:`-- second highest DISTINCT salary per dept\nSELECT\n  dept,\n  -- ...\nFROM employees\n;`
},
{
 id:'sql_dedup',cat:'C · Transformación y DQ',kind:'sql',diff:'m',xp:20,
 title:'Deduplicación idempotente: quedarse con el más reciente',tags:'idempotencia · ROW_NUMBER',
 context:'Un loader reintentó y escribió duplicados por <code>event_id</code>. Antes de hacer MERGE a Silver necesitas una sola fila por evento: la última versión.',
 task:'Por cada <code>event_id</code> conserva solo la fila con <code>updated_at</code> mayor.',
 bullets:['Salida: <code>event_id</code>, <code>user_id</code>, <code>status</code>, <code>updated_at</code>.','Empate en <code>updated_at</code> → desempata por <code>rowid</code> mayor.','SQLite no tiene <code>QUALIFY</code>: usa CTE + filtro <code>rn=1</code>.'],
 sources:[S('events',['event_id','user_id','status','updated_at'],[[1,10,'pending',100],[1,10,'paid',200],[2,11,'pending',150],[3,12,'paid',300],[3,12,'refunded',400]],'updated_at = epoch seconds')],
 expected:'1 10 paid 200\n2 11 pending 150\n3 12 refunded 400',
 datasets:[`CREATE TABLE events(event_id INT,user_id INT,status TEXT,updated_at INT);INSERT INTO events VALUES (1,10,'pending',100),(1,10,'paid',200),(2,11,'pending',150),(3,12,'paid',300),(3,12,'refunded',400),(3,12,'refunded',400);`],
 ref:`WITH r AS (SELECT *,ROW_NUMBER() OVER(PARTITION BY event_id ORDER BY updated_at DESC, rowid DESC) rn FROM events) SELECT event_id,user_id,status,updated_at FROM r WHERE rn=1`,
 starter:`WITH ranked AS (\n  SELECT *,\n    ROW_NUMBER() OVER (/* ... */) AS rn\n  FROM events\n)\nSELECT event_id, user_id, status, updated_at\nFROM ranked\nWHERE rn = 1;`
},
{
 id:'sql_runtot',cat:'D · SQL avanzado',kind:'sql',diff:'e',xp:15,
 title:'Saldo acumulado por cuenta',tags:'window · SUM OVER',
 context:'Finanzas quiere el saldo corriente por cuenta para un extracto. Cada movimiento suma o resta.',
 task:'Calcula el <b>running balance</b> por cuenta ordenado por fecha.',
 bullets:['Salida: <code>account_id</code>, <code>txn_date</code>, <code>running_balance</code>.','Ordena el frame por <code>txn_date, txn_id</code>.'],
 sources:[S('txns',['txn_id','account_id','amount','txn_date'],[[1,1,100,'2024-01-01'],[2,1,-30,'2024-01-02'],[3,1,50,'2024-01-03'],[4,2,200,'2024-01-01']])],
 expected:'1 2024-01-01 100\n1 2024-01-02 70\n1 2024-01-03 120 …',
 datasets:[`CREATE TABLE txns(txn_id INT,account_id INT,amount INT,txn_date TEXT);INSERT INTO txns VALUES (1,1,100,'2024-01-01'),(2,1,-30,'2024-01-02'),(3,1,50,'2024-01-03'),(4,2,200,'2024-01-01'),(5,2,-200,'2024-01-05');`],
 ref:`SELECT account_id,txn_date,SUM(amount) OVER(PARTITION BY account_id ORDER BY txn_date,txn_id) AS running_balance FROM txns`,
 starter:`SELECT\n  account_id,\n  txn_date,\n  -- running_balance ...\nFROM txns;`
},
{
 id:'sql_sessions',cat:'E · Arquitectura Moderna',kind:'sql',diff:'h',xp:30,
 title:'Sessionización con LAG (gap > 30 min)',tags:'window · LAG · gap&island',
 context:'Analytics necesita agrupar clicks en sesiones. Una sesión nueva empieza si pasan más de 30 min (1800s) entre eventos del mismo usuario.',
 task:'Asigna <code>session_id</code> incremental (1,2,3…) por usuario.',
 bullets:['Salida: <code>user_id</code>, <code>ts</code>, <code>session_id</code>.','Primer evento del usuario = sesión 1.','Patrón: flag de quiebre con <code>LAG</code> + <code>SUM() OVER</code> acumulado.'],
 sources:[S('hits',['user_id','ts'],[[1,1000],[1,1200],[1,5000],[1,5500],[2,2000],[2,9000]],'ts = epoch seconds')],
 expected:'1 1000 1 | 1 1200 1 | 1 5000 2 | 1 5500 2 | 2 2000 1 | 2 9000 2',
 datasets:[`CREATE TABLE hits(user_id INT,ts INT);INSERT INTO hits VALUES (1,1000),(1,1200),(1,5000),(1,5500),(2,2000),(2,9000);`],
 ref:`WITH f AS (SELECT user_id,ts,CASE WHEN ts - LAG(ts) OVER(PARTITION BY user_id ORDER BY ts) > 1800 OR LAG(ts) OVER(PARTITION BY user_id ORDER BY ts) IS NULL THEN 1 ELSE 0 END AS brk FROM hits) SELECT user_id,ts,SUM(brk) OVER(PARTITION BY user_id ORDER BY ts) AS session_id FROM f`,
 starter:`WITH flagged AS (\n  SELECT user_id, ts,\n    CASE WHEN /* gap>1800 or first */ THEN 1 ELSE 0 END AS brk\n  FROM hits\n)\nSELECT user_id, ts,\n  -- cumulative session_id\nFROM flagged;`
},
{
 id:'sql_orphan',cat:'F · Governance / DQ',kind:'sql',diff:'e',xp:15,
 title:'Integridad referencial: orphan rows',tags:'DQ · anti-join',
 context:'Un test dbt <code>relationships</code> debe devolver 0 filas. Hay órdenes apuntando a clientes inexistentes (FK rota).',
 task:'Encuentra las <code>orders</code> cuyo <code>customer_id</code> no existe en <code>customers</code>.',
 bullets:['Salida: <code>order_id</code>, <code>customer_id</code>.','Solo filas huérfanas.'],
 sources:[S('customers',['customer_id'],[[1],[2],[3]]),S('orders',['order_id','customer_id'],[[10,1],[11,9],[12,2],[13,99]])],
 expected:'11 9\n13 99',
 datasets:[`CREATE TABLE customers(customer_id INT);INSERT INTO customers VALUES (1),(2),(3);CREATE TABLE orders(order_id INT,customer_id INT);INSERT INTO orders VALUES (10,1),(11,9),(12,2),(13,99);`],
 ref:`SELECT o.order_id,o.customer_id FROM orders o LEFT JOIN customers c ON c.customer_id=o.customer_id WHERE c.customer_id IS NULL`,
 starter:`SELECT o.order_id, o.customer_id\nFROM orders o\n-- anti-join contra customers\n;`
},
{
 id:'sql_streak',cat:'D · SQL avanzado',kind:'sql',diff:'h',xp:30,
 title:'Racha de logins consecutivos (gap-and-island)',tags:'gap&island · ROW_NUMBER',
 context:'Producto quiere la racha más larga de días consecutivos con login por usuario (engagement).',
 task:'Devuelve por usuario la <b>longitud de su racha consecutiva más larga</b>.',
 bullets:['Salida: <code>user_id</code>, <code>longest_streak</code>.','Días duplicados cuentan una vez.','Truco islas: <code>julianday(d) - ROW_NUMBER()</code> es constante dentro de una racha.'],
 sources:[S('logins',['user_id','d'],[[1,'2024-01-01'],[1,'2024-01-02'],[1,'2024-01-03'],[1,'2024-01-05'],[2,'2024-01-01'],[2,'2024-01-03']])],
 expected:'1 → 3 | 2 → 1 | 3 → 2',
 datasets:[`CREATE TABLE logins(user_id INT,d TEXT);INSERT INTO logins VALUES (1,'2024-01-01'),(1,'2024-01-02'),(1,'2024-01-03'),(1,'2024-01-05'),(2,'2024-01-01'),(2,'2024-01-03'),(3,'2024-01-10'),(3,'2024-01-11');`],
 ref:`WITH g AS (SELECT user_id,d, julianday(d)-ROW_NUMBER() OVER(PARTITION BY user_id ORDER BY d) AS grp FROM (SELECT DISTINCT user_id,d FROM logins)) SELECT user_id, MAX(c) AS longest_streak FROM (SELECT user_id,grp,COUNT(*) c FROM g GROUP BY user_id,grp) GROUP BY user_id`,
 starter:`WITH g AS (\n  SELECT user_id, d,\n    julianday(d) - ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY d) AS grp\n  FROM (SELECT DISTINCT user_id, d FROM logins)\n)\n-- agrupa por (user_id, grp), cuenta, toma el MAX por usuario\n;`
},
{
 id:'sql_scd2',cat:'B · Modelado de Datos',kind:'sql',diff:'h',xp:35,
 title:'Construir SCD Type 2 desde snapshots',tags:'SCD2 · islands · valid_from/to',
 context:'Recibes snapshots diarios de precios. Para Silver necesitas una fila por periodo contiguo de precio, con vigencia.',
 task:'Colapsa snapshots en periodos: una fila por cambio de precio.',
 bullets:['Salida: <code>product_id</code>, <code>price</code>, <code>valid_from</code>, <code>valid_to</code>, <code>is_current</code>.','<code>valid_from/to</code> = primer/último día del periodo.','<code>is_current=1</code> si el periodo incluye el último snapshot del producto.','Detecta cambios con <code>LAG</code> + suma acumulada (islands).'],
 sources:[S('snaps',['product_id','price','snapshot_date'],[[1,100,'2024-01-01'],[1,100,'2024-01-02'],[1,120,'2024-01-03'],[1,90,'2024-01-05'],[2,50,'2024-01-01']])],
 expected:'1 100 01-01 01-02 0\n1 120 01-03 01-04 0\n1 90  01-05 01-05 1\n2 50  01-01 01-02 1',
 datasets:[`CREATE TABLE snaps(product_id INT,price INT,snapshot_date TEXT);INSERT INTO snaps VALUES (1,100,'2024-01-01'),(1,100,'2024-01-02'),(1,120,'2024-01-03'),(1,120,'2024-01-04'),(1,90,'2024-01-05'),(2,50,'2024-01-01'),(2,50,'2024-01-02');`],
 ref:`WITH chg AS (SELECT product_id,price,snapshot_date,CASE WHEN price=LAG(price) OVER(PARTITION BY product_id ORDER BY snapshot_date) THEN 0 ELSE 1 END AS isnew FROM snaps), grp AS (SELECT *,SUM(isnew) OVER(PARTITION BY product_id ORDER BY snapshot_date) AS g FROM chg) SELECT product_id,price,MIN(snapshot_date) AS valid_from,MAX(snapshot_date) AS valid_to, CASE WHEN MAX(snapshot_date)=(SELECT MAX(snapshot_date) FROM snaps s WHERE s.product_id=grp.product_id) THEN 1 ELSE 0 END AS is_current FROM grp GROUP BY product_id,g ORDER BY product_id,valid_from`,

/* =========================================================  ENGINE  ========================================================= */
const $=s=>document.querySelector(s);
let state={solved:{},xp:0,streak:0,lastDay:null};
let cur=null,editor=null,SQL=null,pyodide=null,pyLoading=null,quizSel=null,answered=false;
let timer={remaining:0,id:null,paused:false,expired:false};

const levelFor=xp=>Math.floor(xp/100)+1;
function renderXP(){const xp=state.xp;$('#lvl').textContent=levelFor(xp);$('#xptxt').textContent=xp+' XP';$('#xpbar').style.width=(xp%100)+'%';$('#streak').textContent=state.streak;}
async function award(ex){
  if(state.solved[ex.id]){toast('Ya resuelto ✓');return;}
  let gain=ex.xp; let note='';
  if(timer.expired){gain=Math.floor(ex.xp/2);note=' (tiempo agotado: ½ XP)';}
  state.solved[ex.id]=true; state.xp+=gain;
  if(!timer.expired){const t=new Date().toISOString().slice(0,10);
    if(state.lastDay!==t){state.streak=(state.lastDay&&(new Date(t)-new Date(state.lastDay))===86400000)?state.streak+1:1;state.lastDay=t;}}
  stopTimer(); renderXP(); renderRail(); await save();
  toast(`✓ +${gain} XP · ${ex.title}${note}`);
}

/* ---- timer ---- */
function fmt(s){const m=Math.floor(s/60),x=s%60;return m+':'+String(x).padStart(2,'0');}
function paintClock(){const c=$('#clock');if(!c)return;c.textContent=fmt(timer.remaining);
  c.className='clock'+(timer.remaining<=15?' crit':timer.remaining<=60?' warn':'');}
function startTimer(sec){stopTimer();timer={remaining:sec,id:null,paused:false,expired:false};paintClock();
  timer.id=setInterval(()=>{if(timer.paused)return;timer.remaining--;paintClock();
    if(timer.remaining<=0){clearInterval(timer.id);timer.id=null;timer.expired=true;paintClock();toast('⏱ Tiempo agotado — puedes seguir, pero rinde ½ XP');}},1000);}
function stopTimer(){if(timer.id){clearInterval(timer.id);timer.id=null;}}
function toggleTimer(){timer.paused=!timer.paused;const b=$('#tpause');if(b)b.textContent=timer.paused?'▶':'⏸';}
function resetTimer(){if(!cur)return;startTimer(cur.timer||DT[cur.diff]);const b=$('#tpause');if(b)b.textContent='⏸';}

/* ---- rail ---- */
function renderRail(){
  const cats=[...new Set(EX.map(e=>e.cat))];let html='';
  for(const c of cats){html+=`<div class="cat">${c}</div>`;
    for(const e of EX.filter(x=>x.cat===c)){const done=state.solved[e.id];
      html+=`<div class="ex ${cur&&cur.id===e.id?'active':''}" data-id="${e.id}">
        <span class="ico ${e.kind}">${e.kind.toUpperCase()}</span>
        <span><span class="tt">${e.title}</span>
        <span class="mt"><span class="diff ${e.diff}"></span>${({e:'easy',m:'medium',h:'hard'})[e.diff]} · ${e.tags}</span></span>
        ${done?'<span class="chk">✓</span>':''}</div>`;}}
  $('#rail').innerHTML=html;
  document.querySelectorAll('.ex').forEach(el=>el.onclick=()=>{open(el.dataset.id);document.querySelector('.rail').classList.remove('open');});
}

/* ---- open ---- */
function open(id){
  cur=EX.find(e=>e.id===id);answered=false;quizSel=null;
  renderRail();renderProblem();renderWork();
  $('#cases').innerHTML='<div class="console">Pulsa <b>Run tests</b> para evaluar.</div>';
  $('#verdict').textContent='';$('#verdict').className='verdict';$('#tutor').classList.remove('show');
  startTimer(cur.timer||DT[cur.diff]);
}
function srcTable(s){
  let h=`<div class="src"><div class="nm">📄 <b>${s.name}</b></div><table class="dt"><tr>${s.cols.map(c=>`<th>${c}</th>`).join('')}</tr>`;
  h+=s.rows.map(r=>`<tr>${r.map(v=>`<td>${v}</td>`).join('')}</tr>`).join('');
  h+=`</table>${s.note?`<div class="srcnote">${s.note}</div>`:''}</div>`;return h;
}
function renderProblem(){
  const e=cur;let h=`<h1>${e.title}</h1><div class="ptag">${e.cat} · ${e.kind.toUpperCase()} · ${({e:'easy',m:'medium',h:'hard'})[e.diff]} · ${e.xp} XP</div>`;
  if(e.context)h+=`<h3>Contexto</h3><p>${e.context}</p>`;
  if(e.task)h+=`<h3>Tarea</h3><p>${e.task}</p>`;
  if(e.bullets)h+=`<h3>Requisitos</h3><ul>${e.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>`;
  if(e.sources)h+=`<h3>Fuentes / datos disponibles</h3>${e.sources.map(srcTable).join('')}`;
  if(e.expected)h+=`<h3>Salida esperada (muestra)</h3><div class="exp">${e.expected}</div>`;
  if(e.kind==='quiz')h+=`<h3>Selecciona</h3><div id="opts">`+e.options.map((o,i)=>`<label class="opt" data-i="${i}"><span class="mk">${String.fromCharCode(65+i)}</span>${o.t}</label>`).join('')+`</div>`;
  $('#prob').innerHTML=h;
  if(e.kind==='quiz')document.querySelectorAll('.opt').forEach(o=>o.onclick=()=>{if(answered)return;document.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));o.classList.add('sel');quizSel=+o.dataset.i;});
}
function renderWork(){
  const e=cur,tabs=$('#wtabs'),host=$('#edhost'),act=$('#actions');
  const tlabel=e.kind==='quiz'?'respuesta':(e.kind==='sql'?'query.sql':'solution.py');
  tabs.innerHTML=`<div class="wtab active">${tlabel}</div>
    <div class="timer"><span class="clock" id="clock">--:--</span>
      <button id="tpause">⏸</button><button id="treset">⟳</button></div>`;
  $('#tpause').onclick=toggleTimer;$('#treset').onclick=resetTimer;
  if(e.kind==='quiz'){
    host.innerHTML=`<div style="padding:18px;color:var(--muted);font-family:var(--mono);font-size:12.5px;line-height:1.6">Ejercicio conceptual.<br>Elige una opción en el panel izquierdo y pulsa <b>Comprobar</b>.</div>`;editor=null;
    act.innerHTML=`<button class="primary" id="run">Comprobar</button><button id="hint">Pista IA</button>`;
  }else{
    host.innerHTML='';editor=CodeMirror(host,{value:e.starter,mode:e.kind==='sql'?'text/x-sql':'python',theme:'material-darker',lineNumbers:true,lineWrapping:true,indentUnit:e.kind==='python'?4:2});
    setTimeout(()=>editor.refresh(),40);
    act.innerHTML=`<button class="primary" id="run">Run tests ▸</button><button id="hint">Pista IA</button><button id="review">Review IA</button><button class="ghost" id="reveal">Ver solución</button>`;
    $('#reveal').onclick=()=>{if(confirm('¿Mostrar una solución de referencia?'))editor.setValue(e.ref?('-- referencia:\n'+e.ref+';'):'# (referencia no disponible para este ejercicio)');};
    $('#review').onclick=()=>ai('review');
  }
  $('#run').onclick=runTests;$('#hint').onclick=()=>ai('hint');
  paintClock();
}

/* ---- results ---- */
function showCases(list){const pass=list.filter(c=>c.ok).length,all=pass===list.length&&list.length>0;
  $('#verdict').textContent=`${pass}/${list.length}`;$('#verdict').className='verdict '+(all?'pass':'fail');
  $('#cases').innerHTML=list.map(c=>`<div class="case ${c.ok?'pass':'fail'}"><span class="s">${c.ok?'✓':'✗'}</span><span class="d">${c.name}${c.detail?`<br><small>${c.detail}</small>`:''}</span></div>`).join('');return all;}
function showConsole(m){$('#cases').innerHTML=`<div class="console">${m}</div>`;$('#verdict').textContent='';}

/* ---- SQL ---- */
async function ensureSQL(){if(SQL)return SQL;SQL=await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${f}`});return SQL;}
function rowsEq(a,b,ordered){const n=r=>JSON.stringify(r);if(a.length!==b.length)return false;if(ordered)return a.every((r,i)=>n(r)===n(b[i]));const sa=a.map(n).sort(),sb=b.map(n).sort();return sa.every((v,i)=>v===sb[i]);}
function exec(db,sql){const r=db.exec(sql);return r.length?{cols:r[0].columns,rows:r[0].values}:{cols:[],rows:[]};}
function preview(r){const x=r.rows.slice(0,3).map(row=>'['+row.join(',')+']').join(' ');return (x||'∅')+(r.rows.length>3?' …':'');}
async function runSQL(){
  const e=cur,userSQL=editor.getValue().trim().replace(/;+\s*$/,'');
  if(!userSQL){showConsole('Escribe una query.');return false;}
  let lib;try{lib=await ensureSQL();}catch(err){showConsole('No se pudo cargar sql.js: '+err);return false;}
  const cases=[],ordered=/order\s+by/i.test(e.ref);
  for(let i=0;i<e.datasets.length;i++){const db=new lib.Database();
    try{db.run(e.datasets[i]);let exp;try{exp=exec(db,e.ref);}catch(err){cases.push({name:`dataset ${i+1}`,ok:false,detail:'error en referencia: '+err});db.close();continue;}
      let got;try{got=exec(db,userSQL);}catch(err){cases.push({name:`dataset ${i+1}`,ok:false,detail:'SQL error: '+err});db.close();continue;}
      const ok=rowsEq(got.rows,exp.rows,ordered);
      cases.push({name:`dataset ${i+1} · ${exp.rows.length} fila(s) esperadas`,ok,detail:ok?'':`tu salida: ${got.rows.length} fila(s) — ${preview(got)} | esperado: ${preview(exp)}`});
    }finally{db.close();}}
  const all=showCases(cases);if(all)await award(e);return all;
}

/* ---- Python (Pyodide) ---- */
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error('no se pudo cargar '+src));document.head.appendChild(s);});}
async function ensurePy(){if(pyodide)return pyodide;if(pyLoading)return pyLoading;
  showConsole('Cargando runtime de Python (Pyodide, ~una vez)… <span class="pulse">●</span>');
  pyLoading=(async()=>{await loadScript('https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js');pyodide=await loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.26.2/full/'});return pyodide;})();
  return pyLoading;}
async function runPy(){
  const e=cur;let py;
  try{py=await ensurePy();}catch(err){showConsole('No se pudo cargar Python en este entorno (el sandbox bloqueó el runtime).<br>Usa <b>Ver solución</b> o <b>Review IA</b>.<br><small>'+err.message+'</small>');return false;}
  if(e.pyPackages){try{showConsole('Cargando paquetes: '+e.pyPackages.join(', ')+'… <span class="pulse">●</span>');await py.loadPackage(e.pyPackages);}catch(err){showConsole('No se pudieron cargar paquetes ('+e.pyPackages.join(',')+'): '+err);return false;}}
  const code=editor.getValue()+'\n'+e.pytests+'\nimport json\nprint("__RESULTS__"+json.dumps(cases))';
  let out='';py.setStdout({batched:s=>out+=s+'\n'});
  try{await py.runPythonAsync(code);}catch(err){showConsole('Error de ejecución:\n'+(err.message||err));return false;}
  const m=out.indexOf('__RESULTS__');if(m<0){showConsole('Sin resultados. Salida:\n'+out);return false;}
  let list;try{list=JSON.parse(out.slice(m+11));}catch(err){showConsole('Resultados ilegibles.\n'+out);return false;}
  const cases=list.map(c=>({name:c.name,ok:c.ok,detail:c.ok?'':`obtuvo ${c.got} · esperaba ${c.expected}`}));
  const all=showCases(cases);if(all)await award(e);return all;
}

/* ---- quiz ---- */
function runQuiz(){const e=cur;if(quizSel==null){showConsole('Selecciona una opción primero.');return;}
  answered=true;document.querySelectorAll('.opt').forEach((o,i)=>{o.classList.remove('sel');if(e.options[i].ok)o.classList.add('correct');if(i===quizSel&&!e.options[i].ok)o.classList.add('wrong');});
  const ok=e.options[quizSel].ok;showCases([{name:ok?'Correcto':'Incorrecto',ok,detail:e.explain}]);if(ok)award(e);}
function runTests(){if(!cur)return;if(cur.kind==='sql')return runSQL();if(cur.kind==='python')return runPy();if(cur.kind==='quiz')return runQuiz();}

/* ---- AI tutor ---- */
async function ai(mode){const e=cur,panel=$('#tutor');panel.classList.add('show','pulse');panel.textContent=mode==='hint'?'Generando pista…':'Revisando tu código…';
  const code=e.kind==='quiz'?'(conceptual)':(editor?editor.getValue():'');
  const sys=mode==='hint'?`Da UNA pista breve (máx 3 líneas) que oriente sin resolver.`:`Eres un Senior Data Engineer revisando código de un colega senior. Feedback directo, máx 8 líneas: correctitud, edge cases, idempotencia/coste/rendimiento, estilo de producción. Señala líneas concretas. No reescribas todo.`;
  const prompt=`${sys}\n\nEjercicio (${e.kind}): ${e.title}\nObjetivo: ${(e.task||e.context||'').replace(/<[^>]+>/g,'')}\n\nCódigo del usuario:\n${code}`;
  try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const d=await r.json();const txt=(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();panel.classList.remove('pulse');panel.textContent=txt||'Sin respuesta.';
  }catch(err){panel.classList.remove('pulse');panel.textContent='Tutor IA no disponible aquí: '+err.message;}}

/* ---- persistence ---- */
async function save(){try{await window.storage.set('dedojo:v2',JSON.stringify(state),false);}catch(e){}}
async function load(){try{const r=await window.storage.get('dedojo:v2',false);if(r&&r.value)state=Object.assign(state,JSON.parse(r.value));}catch(e){}}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
$('#resetBtn').onclick=async()=>{if(confirm('¿Borrar progreso (XP, resueltos, streak)?')){state={solved:{},xp:0,streak:0,lastDay:null};await save();renderXP();renderRail();}};
window.addEventListener('load',async()=>{await load();renderXP();renderRail();open(EX[0].id);});
</script>
